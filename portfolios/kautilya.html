  <style>
    :root {
      --bg: #222222;
      --front: #f5e7c6;
      --text: #faf3e1;
      --accent: rgba(250, 129, 18, 1);
      --font-sans: "Space Grotesk", system-ui, sans-serif;
      --font-serif: "Bodoni Moda", Georgia, serif;
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      overflow: hidden;
    }

    body {
      position: relative;
      color: var(--text);
      font-family: var(--font-sans);
    }

    .scene,
    #patternCanvas,
    #maskCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #patternCanvas,
    #maskCanvas {
      display: block;
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
    }

    .title {
      position: absolute;
      top: 2rem;
      left: 2rem;
      margin: 0;
      font-size: clamp(1.4rem, 1rem + 1vw, 2.1rem);
      font-weight: 500;
      letter-spacing: 0.03em;
      color: var(--text);
      pointer-events: none;
    }

    .hero {
      position: absolute;
      left: 2rem;
      top: 50%;
      transform: translateY(-50%);
      width: min(45vw, 720px);
      pointer-events: none;
    }

    .hero h2 {
      margin: 0 0 1rem 0;
      font-family: var(--font-serif);
      font-size: clamp(3.6rem, 8vw, 8rem);
      line-height: 0.9;
      letter-spacing: -0.04em;
      font-style: italic;
      font-weight: 700;
      color: var(--text);
      -webkit-text-stroke: 2px var(--front);
      text-shadow:
        1px 1px 0 rgba(250, 129, 18, 1),
        2px 2px 0 rgba(250, 129, 18, 0.9),
        3px 3px 0 rgba(250, 129, 18, 0.8),
        4px 4px 0 rgba(250, 129, 18, 0.7),
        5px 5px 0 rgba(250, 129, 18, 0.6),
        6px 6px 0 rgba(250, 129, 18, 0.5),
        7px 7px 0 rgba(250, 129, 18, 0.4),
        8px 8px 0 rgba(250, 129, 18, 0.3),
        9px 9px 0 rgba(250, 129, 18, 0.2),
        10px 10px 0 rgba(250, 129, 18, 0.1);
    }

    .hero p {
      margin: 0;
      font-size: clamp(1rem, 1.5vw, 1.35rem);
      line-height: 1.45;
      opacity: 0.7;
      color: var(--text);
      font-weight: 300;
    }

    .socials {
      position: absolute;
      left: 2rem;
      bottom: 2rem;
      display: flex;
      gap: 2.5rem;
      z-index: 3;
    }

    .socials a {
      color: var(--text);
      opacity: 1;
      transition: opacity 0.2s ease, transform 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .socials a:hover {
      opacity: 0.7;
      transform: translateY(-1px);
    }

    .socials svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    @media (max-width: 900px) {
      .hero {
        width: min(78vw, 520px);
      }
    }

    @media (max-width: 640px) {
      .title,
      .hero,
      .socials {
        left: 1.25rem;
      }

      .title { top: 1.25rem; }
      .socials { bottom: 1.25rem; gap: 1.5rem; }

      .hero {
        width: calc(100vw - 2.5rem);
      }

      .hero h2 {
        -webkit-text-stroke: 1.25px var(--front);
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <canvas id="patternCanvas" aria-hidden="true"></canvas>
    <canvas id="maskCanvas" aria-hidden="true"></canvas>
  </div>

  <div class="content">
    <h1 class="title">Kautilya Reddy Racha</h1>

    <section class="hero" aria-label="Under construction message">
      <h2>Page<br>Under<br>Construction!</h2>

  <script>
    (() => {
      const patternCanvas = document.getElementById('patternCanvas');
      const maskCanvas = document.getElementById('maskCanvas');
      const pctx = patternCanvas.getContext('2d', { alpha: false });
      const mctx = maskCanvas.getContext('2d');
      let width = 0;
      let height = 0;
      let animationFrame = 0;
      let tick = 0;

      function hash(x, y, seed = 0) {
        const n = Math.sin(x * 127.1 + y * 311.7 + seed * 91.7) * 43758.5453123;
        return n - Math.floor(n);
      }

      function smoothNoise(x, y, scale, seed = 0) {
        const sx = x / scale;
        const sy = y / scale;
        const x0 = Math.floor(sx);
        const y0 = Math.floor(sy);
        const fx = sx - x0;
        const fy = sy - y0;
        const ux = fx * fx * (3 - 2 * fx);
        const uy = fy * fy * (3 - 2 * fy);

        const n00 = hash(x0, y0, seed);
        const n10 = hash(x0 + 1, y0, seed);
        const n01 = hash(x0, y0 + 1, seed);
        const n11 = hash(x0 + 1, y0 + 1, seed);

        const nx0 = n00 * (1 - ux) + n10 * ux;
        const nx1 = n01 * (1 - ux) + n11 * ux;
        return nx0 * (1 - uy) + nx1 * uy;
      }

      function fbm(x, y, speedOffset = 0) {
        let value = 0;
        let amplitude = 1;
        let frequency = 1;
        let total = 0;
        for (let i = 0; i < 5; i++) {
          value += amplitude * smoothNoise(x * frequency + speedOffset, y * frequency + speedOffset, 80, i * 100);
          total += amplitude;
          amplitude *= 0.5;
          frequency *= 2;
        }
        return value / total;
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        const dpr = Math.min(window.devicePixelRatio || 1, 2);

        [patternCanvas, maskCanvas].forEach((canvas) => {
          canvas.width = Math.floor(width * dpr);
          canvas.height = Math.floor(height * dpr);
          canvas.style.width = width + 'px';
          canvas.style.height = height + 'px';
        });

        pctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        mctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        drawMask();
        drawPattern(true);
      }

      function drawPattern(force = false) {
        const cell = 4;
        const cols = Math.ceil(width / cell);
        const rows = Math.ceil(height / cell);
        pctx.fillStyle = '#222222';
        pctx.fillRect(0, 0, width, height);
        pctx.fillStyle = '#f5e7c6';

        for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
            const nx = x * cell;
            const ny = y * cell;
            const noiseValue = fbm(nx * 0.45, ny * 0.45, tick * 0.06);
            const parity = (x + y) % 2;
            const threshold = parity ? 0.44 : 0.56;
            if (noiseValue > threshold) {
              pctx.fillRect(nx, ny, 2, 2);
            }
          }
        }
      }

      function drawMask() {
        mctx.clearRect(0, 0, width, height);
        mctx.fillStyle = '#222222';
        mctx.fillRect(0, 0, width, height);

        const imageData = mctx.getImageData(0, 0, width, height);
        const data = imageData.data;

        for (let y = 0; y < height; y++) {
          for (let x = 0; x < width; x++) {
            const baseThreshold = width * 0.5;
            const noiseValue = fbm(x * 0.8, y * 0.8);
            const noiseOffset = (noiseValue - 0.5) * width * 0.15;
            const detailNoise = fbm(x * 2, y * 2);
            const detailOffset = (detailNoise - 0.5) * width * 0.05;
            const threshold = baseThreshold + noiseOffset + detailOffset;
            const maxThreshold = width * 0.5;
            const clampedThreshold = Math.max(threshold, maxThreshold - width * 0.1);
            const idx = (y * width + x) * 4;
            if (x > clampedThreshold) {
              data[idx + 3] = 0;
            }
          }
        }

        mctx.putImageData(imageData, 0, 0);
      }

      function animate() {
        tick += 1;
        drawPattern();
        animationFrame = requestAnimationFrame(animate);
      }

      window.addEventListener('resize', resize, { passive: true });
      resize();
      animate();

      window.addEventListener('beforeunload', () => cancelAnimationFrame(animationFrame));
    })();
  </script>
</body>
</html>
